name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  TURBO_TELEMETRY_DISABLED: 1
  ASTRO_TELEMETRY_DISABLED: 1
  DO_NOT_TRACK: 1

jobs:
  # Lightweight detection step — feature gates for jobs that depend on
  # not-yet-landed streams. e2e runs only when BOTH apps/docs exists AND
  # e2e specs have been committed (Stream 8b Wave B). Prevents Stream 7's
  # landing from tripping a noisy e2e failure until Stream 8b writes specs.
  detect:
    runs-on: ubuntu-latest
    outputs:
      has-docs: ${{ steps.check.outputs.has-docs }}
      has-eslint: ${{ steps.check.outputs.has-eslint }}
      has-e2e-specs: ${{ steps.check.outputs.has-e2e-specs }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        shell: bash
        run: |
          if [ -d apps/docs ] && [ -f apps/docs/package.json ]; then
            echo "has-docs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-docs=false" >> "$GITHUB_OUTPUT"
          fi
          if ls eslint.config.{js,mjs,cjs,ts} .eslintrc* 2>/dev/null | grep -q .; then
            echo "has-eslint=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-eslint=false" >> "$GITHUB_OUTPUT"
          fi
          if find packages/svelte-mafs/tests/e2e apps/docs/tests/e2e -name '*.spec.ts' 2>/dev/null | grep -q .; then
            echo "has-e2e-specs=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-e2e-specs=false" >> "$GITHUB_OUTPUT"
          fi

  audit:
    name: dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level moderate

  test:
    name: test (Node ${{ matrix.node-version }})
    needs: detect
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: needs.detect.outputs.has-eslint == 'true'
        run: pnpm -r lint

      - name: Typecheck (svelte-mafs)
        run: pnpm -F svelte-mafs typecheck

      # apps/docs imports svelte-mafs through its package.json exports map,
      # which points at dist/. A fresh checkout has no dist/, so the docs
      # typecheck and build below will fail to resolve the package unless we
      # build the lib first. Same reason the e2e job builds it before
      # starting the dev server.
      - name: Build (lib)
        run: pnpm -F svelte-mafs build

      - name: Generate Cloudflare Worker types (docs)
        if: needs.detect.outputs.has-docs == 'true' && matrix.node-version == '22'
        run: pnpm -F docs generate-types

      # apps/docs requires Node >=22.12 (Astro 6 minimum). Skip docs steps
      # on the Node 20 matrix entry — that entry exists to verify the
      # svelte-mafs library still works on the older runtime.
      - name: Typecheck (docs)
        if: needs.detect.outputs.has-docs == 'true' && matrix.node-version == '22'
        run: pnpm -F docs exec astro check

      - name: Unit tests with coverage (svelte-mafs)
        run: pnpm -F svelte-mafs exec vitest run --coverage

      - name: Unit + integration tests (docs)
        if: needs.detect.outputs.has-docs == 'true' && matrix.node-version == '22'
        run: pnpm -F docs test

      - name: Build (docs)
        if: needs.detect.outputs.has-docs == 'true' && matrix.node-version == '22'
        run: pnpm -F docs build

      - name: Upload coverage to Codecov
        if: matrix.node-version == 22 && success()
        uses: codecov/codecov-action@v5
        with:
          files: ./packages/svelte-mafs/coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
          disable_search: true

      - name: Upload coverage report artifact
        if: matrix.node-version == 22 && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: packages/svelte-mafs/coverage/
          retention-days: 14

  e2e:
    name: e2e + visual (chromium)
    needs: [detect, test]
    if: needs.detect.outputs.has-docs == 'true' && needs.detect.outputs.has-e2e-specs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # createAuth() throws when BETTER_AUTH_SECRET or PUBLIC_SITE_URL is
      # missing. Nav.astro catches the throw, but its console.error trips
      # Vite's dev overlay, which intercepts pointer events and breaks
      # every hover-based docs e2e (apple-reacts-to-widget-hover).
      # Nav.astro reads env from `cloudflare:workers`, which sources from
      # .dev.vars in dev mode — shell env vars don't reach it. Write a
      # gitignored .dev.vars with throwaway values so the dev server
      # boots cleanly. The secret is never used for real signing here.
      #
      # PUBLIC_SITE_URL must match Playwright's BASE_URL exactly — `localhost`
      # and `127.0.0.1` are different origins to the browser and to Better
      # Auth's trustedOrigins / requireSameOrigin check, so any mismatch
      # would 403 every state-changing auth/progress POST in CI.
      - name: Seed dev env for Cloudflare Workers
        run: |
          cat > apps/docs/.dev.vars <<'DEVVARS'
          BETTER_AUTH_SECRET=ci_e2e_dummy_secret_not_used_for_real_signing_x_x_x_x
          PUBLIC_SITE_URL=http://localhost:4321
          UNSUBSCRIBE_HMAC_SECRET=ci_e2e_dummy_unsub_hmac_x_x_x_x_x_x_x_x_x_x_x_x_x
          RESEND_API_KEY=ci_e2e_dummy_resend_key
          DEVVARS

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # apps/docs resolves `svelte-mafs` through its package.json exports map,
      # which points at dist/. A fresh checkout has no dist/, so the Astro dev
      # server Playwright boots fails with "Failed to resolve entry for package
      # svelte-mafs". Build the lib before Playwright starts the server.
      - name: Build svelte-mafs (required by apps/docs dev server)
        run: pnpm -F svelte-mafs build

      # The Cloudflare dev D1 starts empty. Every page hits the Better Auth
      # session middleware, which selects from `rate_limit`; without the
      # schema, every request 500s and the vite overlay intercepts pointer
      # events on hover-based e2e specs.
      - name: Apply D1 migrations to local dev DB
        run: pnpm -F docs exec wrangler d1 migrations apply tinker --local

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Install Playwright OS deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium webkit

      - name: Run e2e and visual tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

      - name: Upload visual diff snapshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-snapshots-${{ github.run_id }}
          path: test-results/
          retention-days: 7

  # Aggregate gate so branch protection has a single status to require.
  ci-pass:
    name: CI
    needs: [test, audit, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs succeeded
        env:
          TEST_RESULT: ${{ needs.test.result }}
          AUDIT_RESULT: ${{ needs.audit.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          if [ "$TEST_RESULT" != "success" ]; then
            echo "test job did not succeed: $TEST_RESULT"
            exit 1
          fi
          if [ "$AUDIT_RESULT" != "success" ]; then
            echo "audit job did not succeed: $AUDIT_RESULT"
            exit 1
          fi
          if [ "$E2E_RESULT" != "success" ] && [ "$E2E_RESULT" != "skipped" ]; then
            echo "e2e job did not succeed: $E2E_RESULT"
            exit 1
          fi
          echo "All required jobs passed."
