name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  PNPM_VERSION: 9
  DO_NOT_TRACK: 1

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Skip on forks — changesets/action requires write access to the source repo.
    if: github.repository == 'SkipSupreme/svelte-mafs'
    permissions:
      contents: write       # commit version bumps and create tags
      pull-requests: write  # open / update the Version Packages PR
      id-token: write       # mint OIDC token for npm provenance attestation
    steps:
      - name: Checkout (full history for changeset diffs)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run a release-readiness check before changesets touches anything.
      # Catches missing dist/ entries, oversized payloads, or accidental
      # secret files in the package tarball.
      - name: Pre-publish sanity check
        run: node scripts/release-check.mjs
        env:
          RELEASE_CHECK_MODE: pre

      # changesets/action@v1 has two modes:
      #   1. If pending .changeset/*.md files exist on main, opens or updates
      #      a "Version Packages" PR that consolidates them.
      #   2. If the merged commit IS that Version Packages PR (so HEAD has
      #      bumped versions and an empty .changeset/), runs the `publish`
      #      command, which builds dist/ then `pnpm changeset publish`.
      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm -F svelte-mafs build && pnpm changeset publish
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Summarize outcome
        if: always()
        env:
          PUBLISHED: ${{ steps.changesets.outputs.published }}
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
          HAS_CHANGESETS: ${{ steps.changesets.outputs.hasChangesets }}
        run: |
          {
            echo "## Release outcome"
            echo ""
            if [ "$PUBLISHED" = "true" ]; then
              echo " Published to npm:"
              echo ""
              echo '```json'
              echo "$PUBLISHED_PACKAGES"
              echo '```'
            elif [ "$HAS_CHANGESETS" = "true" ]; then
              echo " Opened or updated Version Packages PR (no publish this run)."
            else
              echo " No pending changesets — nothing to do."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
